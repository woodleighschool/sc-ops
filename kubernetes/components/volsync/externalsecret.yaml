---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: "${APP}-volsync-secret"
    template:
      data:
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        KOPIA_REPOSITORY: s3://sc-ops/volsync
        AWS_S3_ENDPOINT: https://n3.woodleighschool.net
        AWS_ACCESS_KEY_ID: "{{ .N3_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .N3_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: volsync-template
    - extract:
        key: n3
