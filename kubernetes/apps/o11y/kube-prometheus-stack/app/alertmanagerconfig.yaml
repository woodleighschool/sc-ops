---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: email
    repeatInterval: 12h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: email
        matchers:
          - name: severity
            value: critical
            matchType: =
    groupBy:
      - alertname
      - cluster
      - job
    groupInterval: 5m
    groupWait: 1m

  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =

  receivers:
    - name: blackhole
    - name: email
      emailConfigs:
        - to: helpdesk@woodleigh.vic.edu.au
          from: "Alertmanager <alertmanager@woodleigh.vic.edu.au>"
          smarthost: 10.1.110.80:25
          hello: alertmanager.woodleighschool.net
          requireTLS: false
          sendResolved: true
          headers:
            - key: Subject
              value: >-
                [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          html: |-
            {{- range .Alerts }}
              <div style="margin:0 0 16px 0; padding:0 0 14px 0; border-bottom:1px solid #d0d7de;">
                <p style="margin:0 0 10px 0; font-size:14px; line-height:1.45;">
                  {{- if ne .Annotations.description "" -}}
                    {{ .Annotations.description }}
                  {{- else if ne .Annotations.summary "" -}}
                    {{ .Annotations.summary }}
                  {{- else if ne .Annotations.message "" -}}
                    {{ .Annotations.message }}
                  {{- else -}}
                    Alert description not available
                  {{- end -}}
                </p>
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <table style="border-collapse:collapse; font-size:12px; line-height:1.35;">
                  {{- range .Labels.SortedPairs }}
                    <tr>
                      <th style="padding:2px 10px 2px 0; text-align:left; white-space:nowrap; color:#57606a;">{{ .Name }}</th>
                      <td style="padding:2px 0; font-family:monospace;">{{ .Value }}</td>
                    </tr>
                  {{- end }}
                </table>
              {{- end }}
              </div>
            {{- end }}
