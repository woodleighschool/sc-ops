---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: adoverseas
spec:
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: databases
  interval: 1h
  path: ./kubernetes/apps/woodleigh-tools/adoverseas/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: woodleigh-tools
