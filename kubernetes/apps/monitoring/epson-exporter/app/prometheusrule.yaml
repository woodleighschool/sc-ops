---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: epson-exporter
  labels:
    monitoring.woodleighschool.net/rule: "true"
spec:
  groups:
    - name: epson-exporter.rules
      rules:
        - alert: EpsonPrinterScrapeFailed
          expr: |-
            epson_scrape_success == 0
          for: 10m
          annotations:
            summary: >-
              Epson printer {{ $labels.instance }} scrape is failing
            description: >-
              Prometheus has not been able to scrape {{ $labels.instance }} via epson-exporter for 10 minutes.
          labels:
            severity: warning

        #- alert: EpsonInkEmpty
        #  expr: |-
        #    epson_consumable_level_percent{type="ink"} <= 1
        #  for: 15m
        #  annotations:
        #    summary: >-
        #      Epson printer {{ $labels.instance }} {{ $labels.color }} ink is empty
        #    description: >-
        #      {{ $labels.instance }} reports {{ $labels.color }} ink in slot {{ $labels.slot }} at {{ $value }}%.
        #  labels:
        #    severity: critical


        - alert: EpsonPrinterJamOrError
          expr: |-
            epson_status_info{component="printer",status=~"(?i).*(paper jam|jammed|printer error|service required|call service).*"} == 1
          for: 5m
          annotations:
            summary: >-
              Epson printer {{ $labels.instance }} reports a jam or printer error
            description: >-
              {{ $labels.instance }} reports printer status: {{ $labels.status }}.
          labels:
            severity: warning
