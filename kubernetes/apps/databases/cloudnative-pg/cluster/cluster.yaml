---
# yaml-language-server: $schema=https://homelab-schemas-epg.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:dabf20b4a1d0d2d26ad3f39b25dc57a270ffdaf0ca7105a6c897dc9f17c0ac83
  instances: 3
  storage:
    size: 8Gi
    storageClass: openebs-hostpath
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 2Gi
  managed:
    services:
      additional:
        # create a stub service for gatus to monitor
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: postgres
              annotations:
                gatus.home-operations.com/endpoint: |-
                  group: services
                  interval: 15s
                  conditions:
                    - "[CONNECTED] == true"
  enableSuperuserAccess: true
  superuserSecret:
    name: cloudnative-pg-secret
  #bootstrap:
  #  recovery:
  #    source: source
  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: n3
          serverName: postgres
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: n3
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
  monitoring:
    enablePodMonitor: true
  primaryUpdateStrategy: unsupervised
