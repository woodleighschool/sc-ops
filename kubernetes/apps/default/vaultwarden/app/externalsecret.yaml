---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: vaultwarden-secret
    template:
      data:
        ADMIN_TOKEN: "{{ .VAULTWARDEN_ADMIN_TOKEN }}"
        DATABASE_URL: "postgres://{{ .VAULTWARDEN_POSTGRES_USER }}:{{ .VAULTWARDEN_POSTGRES_PASSWORD }}@postgres-rw.databases.svc.cluster.local/vaultwarden"
        SSO_CLIENT_ID: "{{ .VAULTWARDEN_SSO_CLIENT_ID }}"
        SSO_CLIENT_SECRET: "{{ .VAULTWARDEN_SSO_CLIENT_SECRET }}"
        SSO_AUTHORITY: "https://login.microsoftonline.com/{{ .VAULTWARDEN_SSO_TENANT_ID }}/v2.0"
  dataFrom:
    - extract:
        key: vaultwarden
