---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodstar-mdp
spec:
  chartRef:
    kind: OCIRepository
    name: woodstar
  interval: 1h
  values:
    controllers:
      woodstar-mdp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            args:
              - mdp
            image:
              repository: ghcr.io/woodleighschool/woodstar
              tag: 0.5.0@sha256:01ad47868f922cb9ddc3f6887dd375fd60de7e1e791e77a2e0a54973530688f6
            env:
              TZ: Australia/Melbourne
              WOODSTAR_MDP_DATA_DIR: /data
              WOODSTAR_MDP_LISTEN_ADDR: :8080
              WOODSTAR_MDP_LOG_LEVEL: debug
              WOODSTAR_MDP_SERVER_URL: https://woodstar.woodleigh.vic.edu.au
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.woodleighschool.net"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
