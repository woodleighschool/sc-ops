---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: woodstar
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: woodstar-secret
    template:
      data:
        WOODSTAR_DATABASE_URL: "postgres://{{ .DATABASE_USER }}:{{ .DATABASE_PASSWORD }}@postgres-rw.databases.svc.cluster.local:5432/woodstar?sslmode=disable"
        WOODSTAR_SESSION_SECRET: "{{ .WOODSTAR_SESSION_SECRET }}"
        WOODSTAR_ENTRA_TENANT_ID: "{{ .ENTRA_TENANT_ID }}"
        WOODSTAR_ENTRA_CLIENT_ID: "{{ .ENTRA_CLIENT_ID }}"
        WOODSTAR_ENTRA_CLIENT_SECRET: "{{ .ENTRA_CLIENT_SECRET }}"
        WOODSTAR_OIDC_ISSUER_URL: "https://login.microsoftonline.com/{{ .ENTRA_TENANT_ID }}/v2.0"
        WOODSTAR_OIDC_CLIENT_ID: "{{ .ENTRA_CLIENT_ID }}"
        WOODSTAR_OIDC_CLIENT_SECRET: "{{ .ENTRA_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: woodstar
